<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animal Classifier</title>
</head>
<body style="font-family: Arial, sans-serif; text-align: center; margin-top: 50px;">
    <h2>Klasifikasi Gambar Hewan</h2>
    <form action="/" method="POST" enctype="multipart/form-data" style="margin-bottom: 20px;">
        <input type="file" name="file" accept="image/*" required>
        <button type="submit" style="padding: 5px 15px; cursor: pointer;">Prediksi</button>
    </form>
    
    {% if hasil_prediksi %}
        <h3 style="color: green;">Hasil Prediksi: Ini adalah {{ hasil_prediksi | upper }}</h3>
    {% endif %}
</body>
</html>
